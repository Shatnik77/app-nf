user nginx;
worker_processes auto;

pid /tmp/nginx.pid;

error_log stderr warn;

events {
  worker_connections  2048;

  use epoll;        # for efficiency
  multi_accept on;  # for efficiency
}

http {
  include       /etc/nginx/mime.types;
  root          /usr/share/nginx/html;
  default_type  application/octet-stream;

  client_body_temp_path /tmp/client_body;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  proxy_temp_path       /tmp/proxy_temp;
  scgi_temp_path        /tmp/scgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;

  sendfile            on;
  keepalive_timeout   65;

  gzip on;
  gzip_types    application/javascript;
  gzip_buffers  32 8k;

  log_format combined_with_user '$remote_addr - $remote_user $http_x_user_name $http_x_client_version $http_x_client_extra_version $http_correlation_id [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" "$http_x_forwarded_for" ';

  log_format combined_with_body escape=json '$remote_addr - $remote_user $http_x_user_name $http_x_client_version $http_x_client_extra_version $http_correlation_id [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" "$http_x_forwarded_for" '
                      '"$request_body" ';

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.htm;

    server_tokens off;
    absolute_redirect off;

    access_log /dev/stdout combined_with_user;


    location ~ ^(/index.html|.*\.json$)$ {

      expires -1;
      add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
      add_header Pragma 'no-cache' always;
      add_header Expires '0' always;
      include /etc/nginx/conf.d/security-headers.conf;
    }

    # cache scripts and css
    location ~ ^/.*\.(css|js)$ {
      add_header Cache-Control 'max-age=31449600'; # one year
      include /etc/nginx/conf.d/security-headers.conf;
    }

    # SPA: Angular
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control 'max-age=86400'; # one day
      include /etc/nginx/conf.d/security-headers.conf;
    }
  }
}
